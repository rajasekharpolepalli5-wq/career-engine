<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:15px;color:var(--ink)}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--acc)}

/* ── SHARED ── */
.wrap{max-width:1020px;margin:0 auto;padding:24px 20px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.card+.card{margin-top:14px}
h2{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}
.sub{font-size:13.5px;color:var(--muted);margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:.15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,110,245,.1)}
textarea{resize:vertical;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:7px;border:0;background:var(--acc);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:10px;cursor:pointer;transition:.15s}
.btn:hover{background:var(--acc2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--card);color:var(--ink2);border:1px solid var(--line);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}
.pill-g{background:var(--gsoft);color:var(--green)}
.pill-a{background:var(--asoft);color:var(--amber)}
.pill-r{background:var(--rsoft);color:var(--red)}
.pill-b{background:#e8f0fe;color:#1a4db7}
.pill-gray{background:#f0eef8;color:var(--muted)}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state h3{font-size:16px;color:var(--ink);margin-bottom:6px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px}
.metric .n{font-size:26px;font-weight:800;letter-spacing:-.04em;color:var(--ink)}
.metric .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tabs button{border:1px solid var(--line);background:var(--card);color:var(--ink2);padding:8px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.notice{background:#e8f0fe;border:1px solid #c2d4fc;border-radius:9px;padding:10px 14px;font-size:12.5px;color:#1a4db7;margin-bottom:14px}

/* ── JOB CARDS ── */
.jcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;transition:.15s}
.jcard:hover{border-color:#c8c4e8}
.jhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.jtitle{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.jco{font-size:13px;color:var(--muted);margin-top:3px}
.jscore{text-align:right;flex-shrink:0}
.jscore .snum{font-size:26px;font-weight:800;letter-spacing:-.04em}
.jscore .sdiv{font-size:13px;color:var(--muted);font-weight:500}
.jmeta{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.jacts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.jacts button,.jacts a{font-size:12.5px;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.jacts .apply-btn{background:var(--acc);color:#fff;border:0}
.jacts .apply-btn:hover{background:var(--acc2)}
.verdict{background:#f7f6fb;border:1px solid var(--line);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--ink2);margin-top:10px;line-height:1.6}

/* ── RESUME OUTPUT ── */
.resume-wrap{margin-top:14px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.resume-toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f3f2f8;border-bottom:1px solid var(--line)}
.resume-toolbar span{font-size:12px;font-weight:700;color:var(--muted)}
.resume-body{padding:28px 32px;background:#fff;font-family:'Times New Roman',Times,serif;font-size:11pt;line-height:1.4;color:#000}
.resume-body .rname{text-align:center;font-size:14pt;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.resume-body .rcontact{text-align:center;font-size:10pt;margin-bottom:10px;color:#222}
.resume-body hr{border:0;border-top:1.5px solid #000;margin:6px 0}
.resume-body .rsec{font-size:11pt;font-weight:700;letter-spacing:.04em;margin-top:10px;margin-bottom:2px}
.resume-body .rskill-row{margin-bottom:3px;font-size:10.5pt}
.resume-body .rskill-row b{font-weight:700}
.resume-body .rjob-head{display:flex;justify-content:space-between;font-weight:700;font-size:11pt;margin-top:8px}
.resume-body .rjob-stack{font-size:10pt;color:#333;margin:2px 0 4px;font-style:italic}
.resume-body ul{margin:0;padding-left:18px}
.resume-body ul li{font-size:10.5pt;margin-bottom:3px;line-height:1.45}
.resume-body .redu-row{display:flex;justify-content:space-between;font-size:10.5pt;margin-bottom:2px}

/* ── JOB AGE HELPER ── */
function jobAge(postedAt){
  if(!postedAt) return null;
  const diff = Date.now() - postedAt;
  const mins = Math.floor(diff/60000);
  const hrs  = Math.floor(diff/3600000);
  const days = Math.floor(diff/86400000);
  if(mins < 60)  return {label:`${mins}m ago`, urgent:true};
  if(hrs  < 24)  return {label:`${hrs}h ago`,  urgent:true};
  if(days === 1) return {label:`1 day ago`,     urgent:false};
  return           {label:`${days} days ago`,   urgent:false};
}

/* ══════════════════════════════════════════
   JOB VERIFICATION ENGINE
══════════════════════════════════════════ */

// Keywords that disqualify a job (senior / too experienced)
const DISQUALIFY_TITLE = [
  'senior','sr.','sr ','lead','principal','staff','director','manager','head of',
  'vp ','vice president','architect','consultant','specialist','expert',
  '5+','6+','7+','8+','10+'
];
// Keywords that disqualify based on experience requirements in description
const DISQUALIFY_EXP = [
  '5+ years','6+ years','7+ years','8+ years','10+ years',
  '5 years of experience','minimum 5','at least 5 years',
  'senior level','principal level'
];
// Keywords that must appear (at least one) to qualify
const QUALIFY_TITLE = [
  'intern','internship','co-op','coop','co op','entry','junior','jr.',
  'jr ','associate','new grad','early career','0-2','0-1','graduate',
  'trainee','apprentice','analyst i','engineer i','engineer 1'
];

const VERIFY_RESULTS = {}; // cache: url -> {ok, reason, checkedAt}

function verifyJob(j) {
  const title = (j.role || '').toLowerCase();
  const desc  = (j.description || '').toLowerCase();
  const pay   = (j.pay || '').toLowerCase();
  const checks = [];
  let passed = true;

  // 1. Title must contain qualifying keyword
  const hasQualTitle = QUALIFY_TITLE.some(k => title.includes(k));
  checks.push({ label: hasQualTitle ? '✅ Intern/entry level' : '❌ Not intern/entry level', ok: hasQualTitle });
  if (!hasQualTitle) passed = false;

  // 2. Title must NOT contain disqualifying keyword
  const hasDisTitle = DISQUALIFY_TITLE.some(k => title.includes(k));
  checks.push({ label: hasDisTitle ? '❌ Senior title detected' : '✅ No senior keywords', ok: !hasDisTitle });
  if (hasDisTitle) passed = false;

  // 3. Description must NOT require 5+ years
  if (desc) {
    const hasDisExp = DISQUALIFY_EXP.some(k => desc.includes(k));
    checks.push({ label: hasDisExp ? '❌ Requires 5+ years exp' : '✅ Experience level OK', ok: !hasDisExp });
    if (hasDisExp) passed = false;
  }

  // 4. Must have a valid URL
  const hasUrl = j.url && j.url.startsWith('http') && j.url.length > 15;
  checks.push({ label: hasUrl ? '✅ Link present' : '❌ No valid link', ok: hasUrl });
  if (!hasUrl) passed = false;

  // 5. Must not be too old (> 30 days)
  if (j.postedAt) {
    const daysOld = Math.floor((Date.now() - j.postedAt) / 86400000);
    const fresh = daysOld <= 30;
    checks.push({ label: fresh ? `✅ Posted ${daysOld}d ago` : `❌ Posted ${daysOld}d ago (stale)`, ok: fresh });
    if (!fresh) passed = false;
  }

  // 6. Score must be >= 7
  const goodScore = (j.score || 0) >= 7;
  checks.push({ label: goodScore ? `✅ Match score ${j.score}/10` : `❌ Low match ${j.score}/10`, ok: goodScore });
  if (!goodScore) passed = false;

  return { passed, checks };
}

function renderVerifyBadge(j) {
  const { passed, checks } = verifyJob(j);
  const failedChecks = checks.filter(c => !c.ok);
  if (passed) {
    return `<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#e2f5ec;color:#085041;cursor:pointer"
      onclick="document.getElementById('vd-${j.id}').style.display=document.getElementById('vd-${j.id}').style.display==='none'?'block':'none'">
      ✅ Verified (${checks.length}/${checks.length})</span>

      ${checks.map(c=>`<div>${c.label}</div>`).join('')}

/* ── LIVE LINK VERIFIER (uses Greenhouse/Lever APIs — no false positives) ── */
async function verifyLink(url){
  if(!url || !url.startsWith('http')) return {live:false, reason:'No URL'};
  
  try {
    // For Greenhouse: use their public jobs API — returns 404 if job is closed
    if(url.includes('greenhouse.io')) {
      const match = url.match(/greenhouse\.io\/([^\/\?]+)\/jobs\/(\d+)/);
      if(match) {
        const [, board, jobId] = match;
        const apiRes = await fetch(
          `https://boards-api.greenhouse.io/v1/boards/${board}/jobs/${jobId}`,
          {signal: AbortSignal.timeout(5000)}
        );
        if(!apiRes.ok) return {live:false, reason:`Closed (${apiRes.status})`};
        const data = await apiRes.json();
        if(!data.title) return {live:false, reason:'No job title — removed'};
        return {live:true, reason:'OK', title:data.title};
      }
    }
    
    // For Lever: use their public postings API
    if(url.includes('jobs.lever.co')) {
      const match = url.match(/jobs\.lever\.co\/([^\/]+)\/([a-f0-9-]{36})/i);
      if(match) {
        const [, company, jobId] = match;
        const apiRes = await fetch(
          `https://api.lever.co/v0/postings/${company}/${jobId}`,
          {signal: AbortSignal.timeout(5000)}
        );
        if(!apiRes.ok) return {live:false, reason:`Lever 404`};
        return {live:true, reason:'OK'};
      }
    }
    
    // Fallback: no-cors fetch — opaque = reachable
    const res = await fetch(url, {method:'GET', mode:'no-cors', signal:AbortSignal.timeout(6000)});
    return {live: res.type==='opaque', reason: res.type==='opaque'?'OK':'Failed'};
  } catch(e){
    return {live:false, reason:e.message?.includes('abort')?'Timeout':'Failed'};
  }
}

  S.searched = true;

    if(foreign.some(f=>l.includes(f))) return false;
    // Include if matches US state/city pattern
    return USA_STATES.some(s=>l.includes(', '+s)||l.includes(' '+s)||l===s||l.includes('united states'));
  }

  const LIVE_BOARDS = [
    // Aerospace & Hardware
    {company:'spacex',          name:'SpaceX',           src:'Greenhouse'},

    {company:'ramp',            name:'Ramp',             src:'Greenhouse'},
    {company:'brex',            name:'Brex',             src:'Greenhouse'},
    {company:'plaid',           name:'Plaid',            src:'Greenhouse'},
    {company:'robinhood',       name:'Robinhood',        src:'Greenhouse'},
    {company:'coinbase',        name:'Coinbase',         src:'Greenhouse'},
    {company:'chime',           name:'Chime',            src:'Greenhouse'},
    {company:'nerdwallet',      name:'NerdWallet',       src:'Greenhouse'},
    // Data / Cloud / Analytics
    {company:'databricks',      name:'Databricks',       src:'Greenhouse'},
    {company:'snowflake',       name:'Snowflake',        src:'Greenhouse'},
    {company:'dbtlabsinc',      name:'dbt Labs',         src:'Greenhouse'},
    {company:'fivetran',        name:'Fivetran',         src:'Greenhouse'},
    {company:'datadog',         name:'Datadog',          src:'Greenhouse'},
    {company:'elastic',         name:'Elastic',          src:'Greenhouse'},
    {company:'grafana',         name:'Grafana Labs',     src:'Greenhouse'},
    {company:'mongodb',         name:'MongoDB',          src:'Greenhouse'},
    {company:'hashicorp',       name:'HashiCorp',        src:'Greenhouse'},
    {company:'influxdata',      name:'InfluxData',       src:'Greenhouse'},
    // Tech / SaaS
    {company:'figma',           name:'Figma',            src:'Greenhouse'},
    {company:'notion',          name:'Notion',           src:'Greenhouse'},
    {company:'discord',         name:'Discord',          src:'Greenhouse'},
    {company:'reddit',          name:'Reddit',           src:'Greenhouse'},
    {company:'duolingo',        name:'Duolingo',         src:'Greenhouse'},
    {company:'airbnb',          name:'Airbnb',           src:'Greenhouse'},
    {company:'lyft',            name:'Lyft',             src:'Greenhouse'},
    {company:'instacart',       name:'Instacart',        src:'Greenhouse'},

    {company:'cloudflare',      name:'Cloudflare',       src:'Greenhouse'},
    {company:'dropbox',         name:'Dropbox',          src:'Greenhouse'},
    {company:'box',             name:'Box',              src:'Greenhouse'},
    {company:'zendesk',         name:'Zendesk',          src:'Greenhouse'},

    {company:'lattice',         name:'Lattice',          src:'Greenhouse'},
    {company:'rippling',        name:'Rippling',         src:'Greenhouse'},
    {company:'gusto',           name:'Gusto',            src:'Greenhouse'},
    {company:'toast',           name:'Toast',            src:'Greenhouse'},
    // AI / ML
    {company:'scale',           name:'Scale AI',         src:'Greenhouse'},
    {company:'anthropic',       name:'Anthropic',        src:'Greenhouse'},
    {company:'openai',          name:'OpenAI',           src:'Greenhouse'},
    {company:'cohere',          name:'Cohere',           src:'Greenhouse'},

  ];
  const INTERN_KW  = ['intern','internship','co-op','coop','co op','entry level','junior','new grad','0-2 year','0-1 year','graduate engineer','trainee','new graduate'];
  const SENIOR_KW  = ['senior','sr.','sr ','lead','principal','staff','director','manager','5+','6+','7+','vp ','head of','distinguished','phd','iii','iv',' ii ',' ii,'];
  // STRICT: title must contain an explicit data-engineering phrase — not just "engineer" or "data"
  const DATA_TITLE_KW = [
    'data engineer','data engineering','data pipeline','data platform',
    'data infrastructure','data warehouse','analytics engineer','analytics engineering',
    'etl engineer','etl developer','data ops','dataops','data operations',
    'data integration','spark engineer','lakehouse','lake engineer',
    'bi engineer','business intelligence engineer','ml engineer','mlops',
    'machine learning engineer','ai engineer','cloud data','azure data',
    'aws data','gcp data','database engineer','sql engineer'
  ];

  // Score each job 1-10 based on how well it matches Rajasekhar's profile
  function scoreJob(title){
    const t = title.toLowerCase();
    let score = 7; // base
    if(t.includes('data engineer')) score = 10;
    else if(t.includes('data engineering')) score = 10;
    else if(t.includes('analytics engineer')) score = 9;
    else if(t.includes('etl')) score = 9;
    else if(t.includes('data platform') || t.includes('data pipeline')) score = 9;
    else if(t.includes('data infrastructure') || t.includes('data warehouse')) score = 8;
    else if(t.includes('ml engineer') || t.includes('machine learning engineer')) score = 8;
    else if(t.includes('cloud data') || t.includes('azure data')) score = 9;
    if(t.includes('intern') || t.includes('co-op')) score = Math.min(score, 9);
    return score;
  }

  let liveCount = 0;
  for(let i=0; i<LIVE_BOARDS.length; i++){
    const board = LIVE_BOARDS[i];
    S.searchProgress = 5 + Math.floor(i/LIVE_BOARDS.length * 35);
    S.searchStatus = `Scanning ${board.name} (${i+1}/${LIVE_BOARDS.length})…`;
    render();
    try {
      const res = await fetch(`https://boards-api.greenhouse.io/v1/boards/${board.company}/jobs`,
        {signal: AbortSignal.timeout(5000)});
      if(!res.ok) continue;
      const data = await res.json();
      const matched = (data.jobs||[]).filter(j=>{
        const t = j.title.toLowerCase();
        const loc = j.location?.name||'';
        // Must have intern/entry qualifier AND a strict data engineering title term
        const hasIntern  = INTERN_KW.some(k=>t.includes(k));
        const hasSenior  = SENIOR_KW.some(k=>t.includes(k));
        const isDataRole = DATA_TITLE_KW.some(k=>t.includes(k));
        return hasIntern && !hasSenior && isDataRole && isUSA(loc);
      });
      matched.slice(0,3).forEach(j=>{
        const id = `live_${board.company}_${j.id}`;
        if(!freshJobs.find(x=>x.id===id)){
          freshJobs.unshift({
            id, role:j.title, company:board.name,
            loc: j.location?.name||'Remote',
            pay:'See posting', src:board.src, board:board.src,
            score: scoreJob(j.title),
            url: j.absolute_url,
            referral:`careers@${board.company.toLowerCase()}.com`,
            applied:false, tailored:null, linkStatus:null,
            postedAt: j.updated_at ? new Date(j.updated_at).getTime() : Date.now()
          });
          liveCount++;
        }
      });
    } catch(e){}
  }

  // ── STEP 2: Verify every link automatically ──
  S.searchProgress = 45;
  S.searchStatus = `Verifying ${freshJobs.length} job links — removing dead ones…`;
  render();

  const verifyBatch = async (jobs) => {
    const results = await Promise.allSettled(
      jobs.map(async j => {
        const check = await verifyLink(j.url);
        j.linkStatus = check.live;
        j.linkReason = check.reason;
        return j;
      })
    );
    return results.map(r => r.status==='fulfilled'?r.value:null).filter(Boolean);
  };

  // Verify in batches of 4 to avoid overwhelming the browser
  for(let i=0; i<freshJobs.length; i+=4){
    const batch = freshJobs.slice(i, i+4);
    await verifyBatch(batch);
    S.searchProgress = 45 + Math.floor((i/freshJobs.length)*40);
    S.searchStatus = `Verified ${Math.min(i+4, freshJobs.length)}/${freshJobs.length} links…`;
    render();
  }

  // ── STEP 3: Filter — only keep jobs with live links ──
  const liveJobs = freshJobs.filter(j => j.linkStatus !== false);
  const deadCount = freshJobs.filter(j => j.linkStatus === false).length;

  S.searchProgress = 95;
  S.searchStatus = `✅ ${liveJobs.length} live jobs · ❌ ${deadCount} dead links removed automatically`;
  render();
  await new Promise(r=>setTimeout(r,600));

  S.jobs = liveJobs;
  S.searching = false;
  S.searchProgress = 100;
  render();
}

/* ── AI TAILOR ── */
async function tailorJob(id, btn){
  const j = S.jobs.find(x=>x.id===id) || S.apps.find(x=>x.id===id);
  if(!j) return;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Tailoring…';

  const isIntern = j.role.toLowerCase().includes("intern")||j.role.toLowerCase().includes("co-op")||j.role.toLowerCase().includes("co op");

  const prompt=`You are an ATS resume expert. Return ONLY a JSON object — no text before or after, no markdown fences.

JOB: ${j.role} at ${j.company}
TYPE: ${isIntern?"Internship/Co-op — frame as eager MS CS student with production fundamentals":"Entry-level 0-2yr role"}
CANDIDATE: Rajasekhar Polepalli, MS Computer Science (Concordia University Wisconsin, Dec 2026), Data Engineer
REAL METRICS TO KEEP: LimeChat: 5M+ events/day, 40% latency reduction, 99.9% SLA, 60% fewer deployment failures. GoKwik: 3M+ transactions/month, batch runtime 90→35 min, query performance +45%, daily→hourly data freshness.

Respond with exactly this JSON structure:
{
  "score": 9,
  "verdict": "one sentence on why this is a strong match",
  "summary": "2-sentence professional summary tailored to this specific role and company, using keywords from the job title. ${isIntern?"Frame as MS CS student seeking hands-on experience. Do NOT mention 3+ years or seniority.":"Focus on production data engineering fundamentals."}",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake\\nProgramming: Python, PySpark, SQL, Spark SQL, T-SQL, YAML\\nData Engineering: ETL/ELT, Lakehouse Architecture, Bronze/Silver/Gold, Dimensional Modeling, Star Schema\\nStreaming: Spark Structured Streaming, Event-Time Processing, Delta Lake Checkpointing\\nDevOps: Azure DevOps, Git, CI/CD, pytest, YAML Pipelines\\nDatabases: PostgreSQL, MySQL, REST APIs, Pandas, NumPy",
  "jobs": [
    {
      "role": "Data Engineer",
      "company": "LimeChat",
      "period": "Jul 2023 – Jul 2024",
      "stack": "pick 5-7 tools most relevant to ${j.role}: Azure Databricks, PySpark, Delta Lake, Spark Structured Streaming, ADLS Gen2, Azure Data Factory, Azure DevOps, pytest",
      "bullets": [
        "strong-verb bullet using this JD keywords, metric: 5M+ events/day, 40% latency reduction",
        "strong-verb bullet, metric: 99.9% SLA",
        "strong-verb bullet, metric: 60% fewer deployment failures",
        "strong-verb bullet relevant to ${j.company} tech stack"
      ]
    },
    {
      "role": "Data Engineer",
      "company": "GoKwik",
      "period": "May 2021 – Jun 2023",
      "stack": "pick 5-7 tools most relevant to ${j.role}: Azure Databricks, PySpark, Azure Synapse Analytics, Delta Lake, PostgreSQL, MySQL, Azure Data Factory, Python",
      "bullets": [
        "strong-verb bullet using JD keywords, metric: 3M+ transactions/month",
        "strong-verb bullet, metric: batch runtime 90→35 min",
        "strong-verb bullet, metric: query performance +45%",
        "strong-verb bullet, metric: daily→hourly data freshness"
      ]
    }
  ],
  "keywords": ["6 exact ATS keywords extracted from the job description"]
}`;

  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    // Extract JSON robustly — strip any prose before/after
    const jsonMatch = txt.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error("No JSON in response");
    const r = JSON.parse(jsonMatch[0]);
    j.tailored = r; j.verdict = r.verdict; if(r.score) j.score = r.score;
    if(!S.apps.find(x=>x.id===j.id)) S.apps.push(j);
    render();
  } catch(e){
    btn.disabled=false; btn.textContent="Try again";
    console.error("Tailor error:", e.message);
  }
}

function markApplied(id){
  const j = S.jobs.find(x=>x.id===id)||S.apps.find(x=>x.id===id);
  if(j){ j.applied=true; if(!S.apps.find(x=>x.id===id)) S.apps.push(j); render(); }
}

async function runAdd(){
  const title = document.getElementById("add-title")?.value?.trim();
  const co = document.getElementById("add-co")?.value?.trim();
  const jd = document.getElementById("add-jd")?.value?.trim();
  const btn = document.getElementById("add-btn");
  const err = document.getElementById("add-err");
  if(!jd||jd.length<40){ if(err) err.textContent="Please paste a fuller job description."; return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Scoring & tailoring…';
  if(err) err.textContent="";
  const newJob = {id:"p"+Date.now(), role:title||"Data Engineer Role", company:co||"Company", loc:"", pay:"", src:"Pasted", board:"", score:8, url:"", applied:false, tailored:null};
  S.jobs.push(newJob);
  // Reuse tailorJob but pass JD into prompt via a modified approach
  const prompt=`You are an expert ATS resume writer for Data Engineering roles.

TARGET ROLE: ${newJob.role} at ${newJob.company}
JOB DESCRIPTION:
${jd}

CANDIDATE: Rajasekhar Polepalli — 3+ years Data Engineer, Azure/Databricks/PySpark specialist
STRATEGY: This is a ${newJob.role.toLowerCase().includes("intern")?"internship":"entry-level/1-year-exp"} role. Tailor to appear as a strong match.

Return ONLY valid JSON (no markdown):
{
  "score": <int 1-10, honest match>,
  "verdict": "<one sentence>",
  "summary": "<2-sentence tailored summary using the JD language>",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake, Azure SQL\\nProgramming & Query: SQL, T-SQL, Spark SQL, Python, PySpark, YAML, DAX, Shell\\nData Engineering: ETL/ELT, Data Warehousing, Dimensional Modeling, Star Schema, Lakehouse, Bronze/Silver/Gold Architecture\\nStreaming & Real-Time: Spark Structured Streaming, Event-Time Processing, Watermarking, Delta Lake Checkpointing\\nDevOps & CI/CD: Azure DevOps, Git, GitHub, YAML Pipelines, CI/CD, pytest, Agile/Scrum\\nDatabases & Integration: PostgreSQL, MySQL, REST APIs, JSON, Pandas, NumPy, T-SQL Stored Procedures\\nGovernance & Quality: Data Governance, Data Lineage, Data Quality, Schema Validation",
  "jobs": [
    {"role":"Data Engineer","company":"LimeChat","location":"India","period":"Jul 2023 – Jul 2024","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 5M+ events/day, 40% latency cut, 99.9% SLA>"]},
    {"role":"Data Engineer","company":"GoKwik","location":"India","period":"May 2021 – Jun 2023","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 3M+ txn/month, 90→35 min, 45% query perf>"]}
  ],
  "keywords": ["<6 ATS keywords>"],
  "plain": "<full plain text resume>"
}`;
  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const r = JSON.parse(txt);
    newJob.tailored=r; newJob.verdict=r.verdict; if(r.score) newJob.score=r.score;
    S.apps.push(newJob); S.tab="apps"; render();
  } catch(e){
    btn.disabled=false; btn.innerHTML="✦ Score &amp; tailor resume";
    if(err) err.textContent="Couldn't parse that — try again with a fuller description.";
  }
}
