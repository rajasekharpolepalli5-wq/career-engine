<!DOCTYPE html>

<style>
:root{

  --bg:#f7f6fb;--card:#fff;--acc:#1a6ef5;--acc2:#0d5cd4;
  --green:#0a7c4e;--gsoft:#e2f5ec;--amber:#8a5c00;--asoft:#fdf2d8;
  --red:#c0291e;--rsoft:#fde8e6;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}

/* ── DASHBOARD TOPBAR (owner only) ── */
.dash-topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:rgba(247,246,251,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:15px;color:var(--ink)}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--acc)}

/* ── SHARED ── */
.wrap{max-width:1020px;margin:0 auto;padding:24px 20px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.card+.card{margin-top:14px}
h2{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}
.sub{font-size:13.5px;color:var(--muted);margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:.15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,110,245,.1)}
textarea{resize:vertical;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:7px;border:0;background:var(--acc);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:10px;cursor:pointer;transition:.15s}
.btn:hover{background:var(--acc2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--card);color:var(--ink2);border:1px solid var(--line);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}
.pill-g{background:var(--gsoft);color:var(--green)}
.pill-a{background:var(--asoft);color:var(--amber)}
.pill-r{background:var(--rsoft);color:var(--red)}
.pill-b{background:#e8f0fe;color:#1a4db7}
.pill-gray{background:#f0eef8;color:var(--muted)}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state h3{font-size:16px;color:var(--ink);margin-bottom:6px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px}
.metric .n{font-size:26px;font-weight:800;letter-spacing:-.04em;color:var(--ink)}
.metric .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tabs button{border:1px solid var(--line);background:var(--card);color:var(--ink2);padding:8px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.notice{background:#e8f0fe;border:1px solid #c2d4fc;border-radius:9px;padding:10px 14px;font-size:12.5px;color:#1a4db7;margin-bottom:14px}

/* ── JOB CARDS ── */
.jcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;transition:.15s}
.jcard:hover{border-color:#c8c4e8}
.jhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.jtitle{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.jco{font-size:13px;color:var(--muted);margin-top:3px}
.jscore{text-align:right;flex-shrink:0}
.jscore .snum{font-size:26px;font-weight:800;letter-spacing:-.04em}
.jscore .sdiv{font-size:13px;color:var(--muted);font-weight:500}
.jmeta{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.jacts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.jacts button,.jacts a{font-size:12.5px;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.jacts .apply-btn{background:var(--acc);color:#fff;border:0}
.jacts .apply-btn:hover{background:var(--acc2)}
.verdict{background:#f7f6fb;border:1px solid var(--line);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--ink2);margin-top:10px;line-height:1.6}

/* ── RESUME OUTPUT ── */
.resume-wrap{margin-top:14px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.resume-toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f3f2f8;border-bottom:1px solid var(--line)}
.resume-toolbar span{font-size:12px;font-weight:700;color:var(--muted)}
.resume-body{padding:28px 32px;background:#fff;font-family:'Times New Roman',Times,serif;font-size:11pt;line-height:1.4;color:#000}
.resume-body .rname{text-align:center;font-size:14pt;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.resume-body .rcontact{text-align:center;font-size:10pt;margin-bottom:10px;color:#222}
.resume-body hr{border:0;border-top:1.5px solid #000;margin:6px 0}
.resume-body .rsec{font-size:11pt;font-weight:700;letter-spacing:.04em;margin-top:10px;margin-bottom:2px}
.resume-body .rskill-row{margin-bottom:3px;font-size:10.5pt}
.resume-body .rskill-row b{font-weight:700}
.resume-body .rjob-head{display:flex;justify-content:space-between;font-weight:700;font-size:11pt;margin-top:8px}
.resume-body .rjob-stack{font-size:10pt;color:#333;margin:2px 0 4px;font-style:italic}
.resume-body ul{margin:0;padding-left:18px}
.resume-body ul li{font-size:10.5pt;margin-bottom:3px;line-height:1.45}
.resume-body .redu-row{display:flex;justify-content:space-between;font-size:10.5pt;margin-bottom:2px}

#pf-root{background:#0a0912;color:#f4f2ff;min-height:100vh;overflow-x:hidden}
.pf-nav{display:flex;justify-content:space-between;align-items:center;padding:22px 48px;position:sticky;top:0;z-index:50;background:rgba(10,9,18,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07)}
.pf-logo{font-weight:800;font-size:16px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.pf-logo-ring{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#1a6ef5,#06d6a0);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}
.pf-navlinks{display:flex;gap:28px;font-size:14px}
.pf-navlinks a{color:rgba(255,255,255,.5);text-decoration:none;transition:.2s}
.pf-navlinks a:hover{color:#fff}

.pf-hero{max-width:900px;margin:0 auto;padding:90px 48px 60px;position:relative}
.pf-tag{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#06d6a0;border:1px solid rgba(6,214,160,.25);background:rgba(6,214,160,.06);padding:6px 14px;border-radius:99px;margin-bottom:22px}
.pf-tag-dot{width:6px;height:6px;border-radius:50%;background:#06d6a0;box-shadow:0 0 8px #06d6a0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pf-h1{font-size:clamp(42px,7vw,88px);font-weight:900;line-height:.94;letter-spacing:-.045em;margin-bottom:22px}
.pf-h1 .grad{background:linear-gradient(100deg,#1a6ef5 0%,#06d6a0 45%,#f5a623 80%);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:200%;animation:flowgrad 5s linear infinite}
@keyframes flowgrad{to{background-position:200% center}}
.pf-lead{font-size:clamp(16px,2.2vw,20px);color:rgba(255,255,255,.55);max-width:580px;line-height:1.6;margin-bottom:32px}
.pf-stats{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:40px}
.pf-stat .n{font-size:32px;font-weight:900;letter-spacing:-.04em;color:#fff}
.pf-stat .l{font-size:12px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.pf-ctas{display:flex;gap:12px;flex-wrap:wrap}
.pf-btn-primary{background:linear-gradient(110deg,#1a6ef5,#06d6a0);color:#fff;border:0;padding:14px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 28px rgba(26,110,245,.3);transition:.2s;text-decoration:none;display:inline-block}
.pf-btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(26,110,245,.45)}
.pf-btn-sec{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#fff;padding:14px 26px;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;text-decoration:none;display:inline-block;transition:.2s;backdrop-filter:blur(6px)}
.pf-btn-sec:hover{border-color:rgba(255,255,255,.35)}

.pf-sec{max-width:900px;margin:0 auto;padding:50px 48px}
.pf-sec-h{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.pf-sec-num{font-size:12px;color:rgba(255,255,255,.25);font-weight:700;letter-spacing:.1em}

.skill-cloud{display:flex;flex-wrap:wrap;gap:10px}

  #chat-panel{width:calc(100vw - 32px);right:16px}
}

function ownerAccess(){ S.gateOpen=true; S.gateStep="email"; render(); }

function closeGate(){ S.gateOpen=false; _otp=null; if(!S.unlocked) S.view="portfolio"; render(); }

function _genOTP(){ return String(Math.floor(100000+Math.random()*900000)); }

async function sendOTP(){
  const inp = document.getElementById("gate-email");
  const err = document.getElementById("gate-err");
  const btn = document.getElementById("gate-send-btn");
  const v = (inp?.value||"").trim().toLowerCase();

  if(!v||!v.includes("@")){ err.textContent="Enter a valid email."; return; }
  if(!OWNER_EMAILS.map(e=>e.toLowerCase()).includes(v)){
    err.textContent="Access denied — this dashboard is private.";
    return;
  }

  btn.disabled=true; btn.textContent="Sending…";
  err.textContent="";

  _otp = _genOTP();
  _otpExpiry = Date.now() + 10*60*1000; // 10 min expiry
  _otpEmail = v;

  try {
    // Load EmailJS SDK if not already loaded
    if(!window.emailjs){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
      emailjs.init(EJS_PUBKEY);
    }
    await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
      email: _otpEmail,
      otp_code: _otp,
      expiry: "10 minutes"
    });
    S.gateStep="otp"; render();
  } catch(e){
    _otp=null;
    btn.disabled=false; btn.textContent="Send OTP";
    err.textContent="Failed to send OTP — check EmailJS config.";
  }
}

function verifyOTP(){
  const inp = document.getElementById("gate-otp");
  const err = document.getElementById("otp-err");
  const v = (inp?.value||"").trim();

  if(!v||v.length!==6){ err.textContent="Enter the 6-digit code."; return; }
  if(Date.now() > _otpExpiry){ err.textContent="OTP expired. Request a new one."; _otp=null; S.gateStep="email"; render(); return; }
  if(v !== _otp){ err.textContent="Incorrect code. Try again."; inp.value=""; return; }

  // ✅ correct
  _otp=null; _otpEmail="";
  S.unlocked=true; S.gateOpen=false; S.view="dashboard"; render();
}

function resendOTP(){ S.gateStep="email"; _otp=null; render(); }

/* ── JOB AGE HELPER ── */
function jobAge(postedAt){
  if(!postedAt) return null;
  const diff = Date.now() - postedAt;
  const mins = Math.floor(diff/60000);
  const hrs  = Math.floor(diff/3600000);
  const days = Math.floor(diff/86400000);
  if(mins < 60)  return {label:`${mins}m ago`, urgent:true};
  if(hrs  < 24)  return {label:`${hrs}h ago`,  urgent:true};
  if(days === 1) return {label:`1 day ago`,     urgent:false};
  return           {label:`${days} days ago`,   urgent:false};
}

    <div class="jmeta">

    ${(t.jobs||ME.experience).map(e=>`
    <div class="rjob-head"><span>${e.role}, ${e.company} (${e.location})</span><span>${e.period}</span></div>
    <div class="rjob-stack">Tech Stack: ${e.stack}</div>
    <ul>${(e.bullets||[]).map(b=>`<li>${b}</li>`).join("")}</ul>`).join("")}
    <div class="rsec">EDUCATION</div>
    <hr>
    ${ME.education.map(e=>`<div class="redu-row"><span><b>${e.degree}</b>, ${e.school}</span><span>${e.period}</span></div>`).join("")}
  </div>
</div>`;
}

function copyResume(btn){
  const txt = btn.dataset.resume;
  navigator.clipboard?.writeText(txt).then(()=>{ btn.textContent="Copied!"; setTimeout(()=>btn.textContent="Copy",2000); });
}

/* ── AI TAILOR ── */
async function tailorJob(id, btn){
  const j = S.jobs.find(x=>x.id===id) || S.apps.find(x=>x.id===id);
  if(!j) return;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Tailoring…';

  const prompt=`You are an expert ATS resume writer for Data Engineering roles.

TARGET ROLE: ${j.role} at ${j.company}
CANDIDATE: Rajasekhar Polepalli — 3+ years Data Engineer, Azure/Databricks/PySpark specialist
STRATEGY: This is a ${j.role.toLowerCase().includes("intern")?"internship":"entry-level/1-year-exp"} role being targeted deliberately. Tailor the resume to appear as a strong match — emphasize fundamentals, learning agility, and relevant production experience without overselling seniority.

Return ONLY valid JSON (no markdown, no backticks):
{
  "score": <int 1-10>,
  "verdict": "<one sentence on fit>",
  "summary": "<2-sentence tailored summary using the JD's language, emphasizing Azure/PySpark/Delta Lake fundamentals, mention open to internship/co-op>",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake, Azure SQL\\nProgramming & Query: SQL, T-SQL, Spark SQL, Python, PySpark, YAML, DAX, Shell\\nData Engineering: ETL/ELT, Data Warehousing, Dimensional Modeling, Star Schema, Lakehouse, Bronze/Silver/Gold Architecture\\nStreaming & Real-Time: Spark Structured Streaming, Event-Time Processing, Watermarking, Delta Lake Checkpointing\\nDevOps & CI/CD: Azure DevOps, Git, GitHub, YAML Pipelines, CI/CD, pytest, Agile/Scrum\\nDatabases & Integration: PostgreSQL, MySQL, REST APIs, JSON, Pandas, NumPy, T-SQL Stored Procedures\\nGovernance & Quality: Data Governance, Data Lineage, Data Quality, Schema Validation",
  "jobs": [
    {
      "role": "Data Engineer",
      "company": "LimeChat",
      "location": "India",
      "period": "Jul 2023 – Jul 2024",
      "stack": "<pick 6-8 most relevant tools from: Azure Data Factory, Azure Databricks, PySpark, Spark Structured Streaming, Spark SQL, Delta Lake, ADLS Gen2, Azure Synapse, Microsoft Fabric, T-SQL, Azure DevOps, Git, YAML, pytest, REST APIs>",
      "bullets": ["<4 bullets rewritten to match this JD's keywords. Keep all real metrics: 5M+ events/day, 40% latency cut, 99.9% SLA, 60% fewer deployment failures. Start each with a strong verb.>"]
    },
    {
      "role": "Data Engineer",
      "company": "GoKwik",
      "location": "India",
      "period": "May 2021 – Jun 2023",
      "stack": "<pick 6-8 most relevant tools from: Azure Databricks, Azure Data Factory, PySpark, Spark SQL, Delta Lake, ADLS Gen2, Azure Synapse, T-SQL, PostgreSQL, MySQL, Python, Pandas, NumPy, Azure DevOps, YAML, Git>",
      "bullets": ["<4 bullets rewritten to match this JD. Keep metrics: 3M+ transactions/month, 90→35 min runtime, 45% query perf, daily→hourly freshness. Strong verbs.>"]
    }
  ],
  "keywords": ["<6 exact ATS keywords from the JD>"],
  "plain": "<full resume as plain text matching the PDF format exactly: name, contact, SUMMARY section, TECHNICAL SKILLS section, PROFESSIONAL EXPERIENCE section with both jobs, EDUCATION section>"
}`;

  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const r = JSON.parse(txt);
    j.tailored = r; j.verdict = r.verdict; if(r.score) j.score = r.score;
    // also push to apps if not there
    if(!S.apps.find(x=>x.id===j.id)) S.apps.push(j);
    render();
  } catch(e){
    btn.disabled=false; btn.innerHTML="Tailor resume"; btn.textContent="Try again";
  }
}

function markApplied(id){
  const j = S.jobs.find(x=>x.id===id)||S.apps.find(x=>x.id===id);
  if(j){ j.applied=true; if(!S.apps.find(x=>x.id===id)) S.apps.push(j); render(); }
}

/* ── APPS ── */
function renderApps(){
  if(!S.apps.length) return `<div class="card"><div class="empty-state">
    <h3>No applications yet</h3>
    <p style="margin:0 auto 20px;max-width:400px">Tailor a resume from the Job hunter or paste a job here.</p>
    <button class="btn" onclick="setTab('hunter')">Go to job hunter</button>
  </div></div>`;
  const applied = S.apps.filter(j=>j.applied).length;
  const avg = Math.round(S.apps.reduce((a,j)=>a+j.score,0)/S.apps.length*10)/10;
  return `<div class="metrics">
    <div class="metric"><div class="n">${S.apps.length}</div><div class="l">Tracked</div></div>
    <div class="metric"><div class="n">${S.apps.filter(j=>j.score>=9).length}</div><div class="l">9/10+ matches</div></div>
    <div class="metric"><div class="n">${avg}</div><div class="l">Avg score</div></div>
    <div class="metric"><div class="n">${applied}</div><div class="l">Applied</div></div>
  </div>
  ${S.apps.map(j=>jobCard(j,false)).join("")}`;
}

/* ── ADD ── */
function renderAdd(){
  return `<div class="card">
  <h2>Paste a job description</h2>
  <p class="sub">Found a role outside the hunter? Paste it here — Claude scores it against your profile and writes an ATS-tailored resume in your exact format.</p>
  <div class="notice">Live AI — this really calls Claude. Paste a real job description for best results.</div>
  <div class="field"><label>Job title</label><input type="text" id="add-title" placeholder="e.g. Data Engineering Intern"></div>
  <div class="field"><label>Company</label><input type="text" id="add-co" placeholder="e.g. Databricks"></div>
  <div class="field"><label>Full job description</label><textarea id="add-jd" style="min-height:200px" placeholder="Paste the full posting — responsibilities, requirements, tech stack…"></textarea></div>
  <button class="btn" id="add-btn" onclick="runAdd()">✦ Score &amp; tailor resume</button>
  <div id="add-err" style="font-size:12.5px;color:var(--red);margin-top:8px"></div>
</div>`;
}

async function runAdd(){
  const title = document.getElementById("add-title")?.value?.trim();
  const co = document.getElementById("add-co")?.value?.trim();
  const jd = document.getElementById("add-jd")?.value?.trim();
  const btn = document.getElementById("add-btn");
  const err = document.getElementById("add-err");
  if(!jd||jd.length<40){ if(err) err.textContent="Please paste a fuller job description."; return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Scoring & tailoring…';
  if(err) err.textContent="";
  const newJob = {id:"p"+Date.now(), role:title||"Data Engineer Role", company:co||"Company", loc:"", pay:"", src:"Pasted", board:"", score:8, url:"", applied:false, tailored:null};
  S.jobs.push(newJob);
  // Reuse tailorJob but pass JD into prompt via a modified approach
  const prompt=`You are an expert ATS resume writer for Data Engineering roles.

TARGET ROLE: ${newJob.role} at ${newJob.company}
JOB DESCRIPTION:
${jd}

CANDIDATE: Rajasekhar Polepalli — 3+ years Data Engineer, Azure/Databricks/PySpark specialist
STRATEGY: This is a ${newJob.role.toLowerCase().includes("intern")?"internship":"entry-level/1-year-exp"} role. Tailor to appear as a strong match.

Return ONLY valid JSON (no markdown):
{
  "score": <int 1-10, honest match>,
  "verdict": "<one sentence>",
  "summary": "<2-sentence tailored summary using the JD language>",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake, Azure SQL\\nProgramming & Query: SQL, T-SQL, Spark SQL, Python, PySpark, YAML, DAX, Shell\\nData Engineering: ETL/ELT, Data Warehousing, Dimensional Modeling, Star Schema, Lakehouse, Bronze/Silver/Gold Architecture\\nStreaming & Real-Time: Spark Structured Streaming, Event-Time Processing, Watermarking, Delta Lake Checkpointing\\nDevOps & CI/CD: Azure DevOps, Git, GitHub, YAML Pipelines, CI/CD, pytest, Agile/Scrum\\nDatabases & Integration: PostgreSQL, MySQL, REST APIs, JSON, Pandas, NumPy, T-SQL Stored Procedures\\nGovernance & Quality: Data Governance, Data Lineage, Data Quality, Schema Validation",
  "jobs": [
    {"role":"Data Engineer","company":"LimeChat","location":"India","period":"Jul 2023 – Jul 2024","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 5M+ events/day, 40% latency cut, 99.9% SLA>"]},
    {"role":"Data Engineer","company":"GoKwik","location":"India","period":"May 2021 – Jun 2023","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 3M+ txn/month, 90→35 min, 45% query perf>"]}
  ],
  "keywords": ["<6 ATS keywords>"],
  "plain": "<full plain text resume>"
}`;
  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const r = JSON.parse(txt);
    newJob.tailored=r; newJob.verdict=r.verdict; if(r.score) newJob.score=r.score;
    S.apps.push(newJob); S.tab="apps"; render();
  } catch(e){
    btn.disabled=false; btn.innerHTML="✦ Score &amp; tailor resume";
    if(err) err.textContent="Couldn't parse that — try again with a fuller description.";
  }
}
