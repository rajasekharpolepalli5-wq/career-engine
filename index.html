<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rajasekhar Polepalli</title>
<style>
:root{
  --ink:#0f0e1a;--ink2:#2e2c40;--muted:#6b6880;--faint:#9896ab;--line:#e4e2ef;
  --bg:#f7f6fb;--card:#fff;--acc:#1a6ef5;--acc2:#0d5cd4;
  --green:#0a7c4e;--gsoft:#e2f5ec;--amber:#8a5c00;--asoft:#fdf2d8;
  --red:#c0291e;--rsoft:#fde8e6;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}

/* ── DASHBOARD TOPBAR (owner only) ── */
.dash-topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:rgba(247,246,251,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:15px;color:var(--ink)}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--acc)}

/* ── SHARED ── */
.wrap{max-width:1020px;margin:0 auto;padding:24px 20px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.card+.card{margin-top:14px}
h2{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}
.sub{font-size:13.5px;color:var(--muted);margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:.15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,110,245,.1)}
textarea{resize:vertical;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:7px;border:0;background:var(--acc);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:10px;cursor:pointer;transition:.15s}
.btn:hover{background:var(--acc2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--card);color:var(--ink2);border:1px solid var(--line);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px}
.pill-g{background:var(--gsoft);color:var(--green)}
.pill-a{background:var(--asoft);color:var(--amber)}
.pill-r{background:var(--rsoft);color:var(--red)}
.pill-b{background:#e8f0fe;color:#1a4db7}
.pill-gray{background:#f0eef8;color:var(--muted)}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state h3{font-size:16px;color:var(--ink);margin-bottom:6px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px}
.metric .n{font-size:26px;font-weight:800;letter-spacing:-.04em;color:var(--ink)}
.metric .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tabs button{border:1px solid var(--line);background:var(--card);color:var(--ink2);padding:8px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.notice{background:#e8f0fe;border:1px solid #c2d4fc;border-radius:9px;padding:10px 14px;font-size:12.5px;color:#1a4db7;margin-bottom:14px}

/* ── JOB CARDS ── */
.jcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;transition:.15s}
.jcard:hover{border-color:#c8c4e8}
.jhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.jtitle{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.jco{font-size:13px;color:var(--muted);margin-top:3px}
.jscore{text-align:right;flex-shrink:0}
.jscore .snum{font-size:26px;font-weight:800;letter-spacing:-.04em}
.jscore .sdiv{font-size:13px;color:var(--muted);font-weight:500}
.jmeta{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.jacts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.jacts button,.jacts a{font-size:12.5px;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink2);font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.jacts .apply-btn{background:var(--acc);color:#fff;border:0}
.jacts .apply-btn:hover{background:var(--acc2)}
.verdict{background:#f7f6fb;border:1px solid var(--line);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--ink2);margin-top:10px;line-height:1.6}

/* ── RESUME OUTPUT ── */
.resume-wrap{margin-top:14px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.resume-toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f3f2f8;border-bottom:1px solid var(--line)}
.resume-toolbar span{font-size:12px;font-weight:700;color:var(--muted)}
.resume-body{padding:32px 40px;background:#fff;font-family:'Times New Roman',Times,serif;font-size:11pt;line-height:1.45;color:#000;max-width:800px;margin:0 auto}
.resume-body .rname{text-align:center;font-size:15pt;font-weight:700;letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase}
.resume-body .rcontact{text-align:center;font-size:10pt;margin-bottom:4px;color:#222;line-height:1.6}
.resume-body .rcontact a{color:#1155cc;text-decoration:underline}
.resume-body .rcontact a:hover{color:#0b3d91}
.resume-body .ropen{text-align:center;font-size:9.5pt;color:#555;margin-bottom:10px;font-style:italic}
.resume-body hr{border:0;border-top:1.5px solid #000;margin:5px 0 6px}
.resume-body .rsec{font-size:11pt;font-weight:700;letter-spacing:.06em;margin-top:12px;margin-bottom:1px;text-transform:uppercase}
.resume-body .rskill-row{margin-bottom:4px;font-size:10.5pt;line-height:1.45}
.resume-body .rskill-row b{font-weight:700}
.resume-body .rjob-head{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;font-size:11pt;margin-top:10px;margin-bottom:1px}
.resume-body .rjob-stack{font-size:10pt;color:#333;margin:2px 0 5px;font-style:italic;line-height:1.4}
.resume-body ul{margin:2px 0 0;padding-left:20px}
.resume-body ul li{font-size:10.5pt;margin-bottom:4px;line-height:1.45}
.resume-body p.rsummary{font-size:10.5pt;margin:5px 0 10px;line-height:1.5}
.resume-body .redu-row{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5pt;margin-bottom:4px}
.resume-body .redu-row span:first-child{flex:1}

/* ── PORTFOLIO ── */
#pf-root{background:#0a0912;color:#f4f2ff;min-height:100vh;overflow-x:hidden}
.pf-nav{display:flex;justify-content:space-between;align-items:center;padding:22px 48px;position:sticky;top:0;z-index:50;background:rgba(10,9,18,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.07)}
.pf-logo{font-weight:800;font-size:16px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.pf-logo-ring{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#1a6ef5,#06d6a0);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}
.pf-navlinks{display:flex;gap:28px;font-size:14px}
.pf-navlinks a{color:rgba(255,255,255,.5);text-decoration:none;transition:.2s}
.pf-navlinks a:hover{color:#fff}

.pf-hero{max-width:900px;margin:0 auto;padding:90px 48px 60px;position:relative}
.pf-tag{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#06d6a0;border:1px solid rgba(6,214,160,.25);background:rgba(6,214,160,.06);padding:6px 14px;border-radius:99px;margin-bottom:22px}
.pf-tag-dot{width:6px;height:6px;border-radius:50%;background:#06d6a0;box-shadow:0 0 8px #06d6a0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pf-h1{font-size:clamp(42px,7vw,88px);font-weight:900;line-height:.94;letter-spacing:-.045em;margin-bottom:22px}
.pf-h1 .grad{background:linear-gradient(100deg,#1a6ef5 0%,#06d6a0 45%,#f5a623 80%);-webkit-background-clip:text;background-clip:text;color:transparent;background-size:200%;animation:flowgrad 5s linear infinite}
@keyframes flowgrad{to{background-position:200% center}}
.pf-lead{font-size:clamp(16px,2.2vw,20px);color:rgba(255,255,255,.55);max-width:580px;line-height:1.6;margin-bottom:32px}
.pf-stats{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:40px}
.pf-stat .n{font-size:32px;font-weight:900;letter-spacing:-.04em;color:#fff}
.pf-stat .l{font-size:12px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.pf-ctas{display:flex;gap:12px;flex-wrap:wrap}
.pf-btn-primary{background:linear-gradient(110deg,#1a6ef5,#06d6a0);color:#fff;border:0;padding:14px 28px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 28px rgba(26,110,245,.3);transition:.2s;text-decoration:none;display:inline-block}
.pf-btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(26,110,245,.45)}
.pf-btn-sec{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#fff;padding:14px 26px;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;text-decoration:none;display:inline-block;transition:.2s;backdrop-filter:blur(6px)}
.pf-btn-sec:hover{border-color:rgba(255,255,255,.35)}

.pf-sec{max-width:900px;margin:0 auto;padding:50px 48px}
.pf-sec-h{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.pf-sec-num{font-size:12px;color:rgba(255,255,255,.25);font-weight:700;letter-spacing:.1em}
.pf-sec-h h2{font-size:clamp(24px,3.8vw,38px);font-weight:800;letter-spacing:-.03em;margin:0;color:#fff}
.pf-sec-rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.1),transparent)}

.skill-cloud{display:flex;flex-wrap:wrap;gap:10px}
.skill-chip{padding:9px 16px;border-radius:10px;font-size:14px;font-weight:500;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.8);transition:.25s;cursor:default}
.skill-chip:hover{border-color:#1a6ef5;color:#1a6ef5;transform:translateY(-3px);box-shadow:0 8px 20px rgba(26,110,245,.18)}
.skill-chip.core{border-color:rgba(6,214,160,.3);background:rgba(6,214,160,.07);color:#06d6a0}

.exp-item{padding:22px 0;border-bottom:1px solid rgba(255,255,255,.07);display:flex;gap:22px}
.exp-item:last-child{border-bottom:0}
.exp-yr{font-size:13px;color:rgba(255,255,255,.35);min-width:110px;font-weight:600;padding-top:3px}
.exp-body .exp-role{font-size:20px;font-weight:800;letter-spacing:-.02em}
.exp-body .exp-co{font-size:14px;color:rgba(255,255,255,.45);margin:3px 0 10px}
.exp-body ul{padding-left:18px}
.exp-body ul li{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:6px;line-height:1.55}
.exp-body ul li strong{color:rgba(255,255,255,.9);font-weight:700}

.pf-contact-box{background:linear-gradient(140deg,rgba(26,110,245,.2),rgba(6,214,160,.1));border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:50px;text-align:center}
.pf-contact-box h2{font-size:clamp(26px,4.5vw,46px);font-weight:900;letter-spacing:-.04em;margin-bottom:12px}
.pf-contact-box p{color:rgba(255,255,255,.5);font-size:17px;margin-bottom:28px}

.pf-footer{max-width:900px;margin:0 auto;padding:20px 48px 50px;display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,.2);font-size:13px;border-top:1px solid rgba(255,255,255,.07)}

/* chat bubble */
#chat-bubble{position:fixed;bottom:28px;right:28px;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a6ef5,#06d6a0);border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(26,110,245,.45);transition:.2s}
#chat-bubble:hover{transform:scale(1.08)}
#chat-bubble svg{width:24px;height:24px;fill:#fff}
#chat-panel{position:fixed;bottom:90px;right:24px;z-index:200;width:370px;max-height:520px;background:#131120;border:1px solid rgba(255,255,255,.12);border-radius:18px;display:none;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#chat-panel.open{display:flex}
.cp-header{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
.cp-header span{font-size:14px;font-weight:700;color:#fff}
.cp-header button{background:none;border:0;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;line-height:1}
.cp-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08)}
.cp-tabs button{flex:1;padding:10px;background:none;border:0;color:rgba(255,255,255,.4);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border-bottom:2px solid transparent}
.cp-tabs button.on{color:#06d6a0;border-bottom-color:#06d6a0}
.cp-body{flex:1;overflow-y:auto;padding:14px}
.cp-body::-webkit-scrollbar{width:4px}
.cp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.chat-msg{margin-bottom:12px}
.chat-msg.bot .bubble{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);border-radius:14px 14px 14px 4px;padding:10px 13px;font-size:13.5px;line-height:1.55;display:inline-block;max-width:90%}
.chat-msg.user{text-align:right}
.chat-msg.user .bubble{background:linear-gradient(135deg,#1a6ef5,#0a50cc);color:#fff;border-radius:14px 14px 4px 14px;padding:10px 13px;font-size:13.5px;display:inline-block;max-width:90%}
.chat-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.chat-chips button{font-size:12px;padding:6px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);cursor:pointer}
.chat-chips button:hover{border-color:#06d6a0;color:#06d6a0}
.cp-input{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(255,255,255,.08)}
.cp-input input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 12px;color:#fff;font-size:13.5px;outline:none}
.cp-input input::placeholder{color:rgba(255,255,255,.3)}
.cp-input input:focus{border-color:#1a6ef5}
.cp-input button{background:linear-gradient(135deg,#1a6ef5,#06d6a0);border:0;border-radius:8px;padding:9px 14px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.cp-resume{padding:14px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.7;white-space:pre-wrap;font-family:monospace}

/* owner gate */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(5,4,14,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
.gate-box{background:#131120;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:34px;width:100%;max-width:390px;text-align:center;position:relative}
.gate-icon{width:50px;height:50px;border-radius:14px;margin:0 auto 16px;background:linear-gradient(135deg,#1a6ef5,#06d6a0);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.gate-box h3{font-size:20px;font-weight:800;color:#fff;margin-bottom:8px}
.gate-box p{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:22px}
.gate-box input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#fff;font-size:14.5px;outline:none;margin-bottom:12px}
.gate-box input:focus{border-color:#1a6ef5}
.gate-box .close-x{position:absolute;top:16px;right:18px;background:none;border:0;color:rgba(255,255,255,.3);font-size:22px;cursor:pointer;line-height:1}
.gate-sent{color:#06d6a0;font-size:13.5px;margin-top:10px}

@media(max-width:680px){
  .metrics{grid-template-columns:1fr 1fr}
  .row2{grid-template-columns:1fr}
  .pf-hero,.pf-sec,.pf-footer,.pf-nav{padding-left:22px;padding-right:22px}
  .pf-h1{font-size:46px}
  #chat-panel{width:calc(100vw - 32px);right:16px}
}
</style>

/* ── JOB AGE HELPER ── */
function jobAge(postedAt){
  if(!postedAt) return null;
  const diff = Date.now() - postedAt;
  const mins = Math.floor(diff/60000);
  const hrs  = Math.floor(diff/3600000);
  const days = Math.floor(diff/86400000);
  if(mins < 60)  return {label:`${mins}m ago`, urgent:true};
  if(hrs  < 24)  return {label:`${hrs}h ago`,  urgent:true};
  if(days === 1) return {label:`1 day ago`,     urgent:false};
  return           {label:`${days} days ago`,   urgent:false};
}

/* ── LIVE LINK VERIFIER — also fetches JD content for profile matching ── */
async function verifyLink(url){
  if(!url || !url.startsWith('http')) return {live:false, reason:'No URL'};
  
  try {
    // For Greenhouse: use their public jobs API — returns 404 if job is closed
    if(url.includes('greenhouse.io')) {
      const match = url.match(/greenhouse\.io\/([^\/\?]+)\/jobs\/(\d+)/);
      if(match) {
        const [, board, jobId] = match;
        const apiRes = await fetch(
          `https://boards-api.greenhouse.io/v1/boards/${board}/jobs/${jobId}?questions=true`,
          {signal: AbortSignal.timeout(5000)}
        );
        if(!apiRes.ok) return {live:false, reason:`Closed (${apiRes.status})`};
        const data = await apiRes.json();
        if(!data.title) return {live:false, reason:'No job title — removed'};
        // Strip HTML from description
        const rawDesc = data.content || '';
        const description = rawDesc.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        return {live:true, reason:'OK', title:data.title, description};
      }
    }
    
    // For Lever: use their public postings API
    if(url.includes('jobs.lever.co')) {
      const match = url.match(/jobs\.lever\.co\/([^\/]+)\/([a-f0-9-]{36})/i);
      if(match) {
        const [, company, jobId] = match;
        const apiRes = await fetch(
          `https://api.lever.co/v0/postings/${company}/${jobId}`,
          {signal: AbortSignal.timeout(5000)}
        );
        if(!apiRes.ok) return {live:false, reason:`Lever 404`};
        const data = await apiRes.json();
        const description = [
          data.descriptionPlain||'',
          (data.lists||[]).map(l=>l.content||'').join(' '),
          data.additionalPlain||''
        ].join(' ').replace(/\s+/g,' ').trim();
        return {live:true, reason:'OK', title:data.text, description};
      }
    }
    
    // Fallback: no-cors fetch — opaque = reachable
    const res = await fetch(url, {method:'GET', mode:'no-cors', signal:AbortSignal.timeout(6000)});
    return {live: res.type==='opaque', reason: res.type==='opaque'?'OK':'Failed'};
  } catch(e){
    return {live:false, reason:e.message?.includes('abort')?'Timeout':'Failed'};
  }
}

      const data = await res.json();
      (data.jobs||[]).forEach(j=>{
        if(!isTitleDE(j.title||'')) return;
        const loc = j.location||j.address?.addressLocality||'';
        if(!isUSA(loc)) return;
        const id = `ash_${board.slug}_${j.id||j.jobUrl}`;
        const pay = j.compensation?.compensationTierSummary||'See posting';
        // Capture description from the listing — Ashby includes it inline
        const desc = (j.descriptionPlain||'').trim() ||
                     (j.descriptionHtml||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        addCandidate({
          id, role:j.title, company:board.name,
          loc:loc||'Remote',
          pay, src:'Ashby', board:'Ashby',
          url:j.jobUrl||j.applyUrl,
          referral:`careers@${board.slug.toLowerCase()}.com`,
          postedAt:j.publishedAt?new Date(j.publishedAt).getTime():Date.now(),
          _scanDesc: desc
        });
      });
    }catch(e){}
  }

  S.searchStatus = `Found ${allCandidates.length} title-matched DE candidates — fetching JDs & scoring…`;
  S.searchProgress = 58;
  render();

  // ── FETCH JD + SCORE every candidate ──
  const matched = [];

  async function fetchJDAndScore(j){
    try{
      let desc = '', liveTitle = j.role;

      if(j.src==='Greenhouse'){
        const m = j.url.match(/greenhouse\.io\/([^\/\?]+)\/jobs\/(\d+)/);
        if(!m) return;
        const res = await fetch(
          `https://boards-api.greenhouse.io/v1/boards/${m[1]}/jobs/${m[2]}?questions=true`,
          {signal:AbortSignal.timeout(7000)});
        if(!res.ok) return;
        const d = await res.json();
        if(!d.title) return;
        liveTitle = d.title;
        desc = (d.content||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      }
      else if(j.src==='Lever'){
        // Prefer description captured at scan time (Lever returns it inline)
        if(j._scanDesc && j._scanDesc.length > 100){
          desc = j._scanDesc;
          liveTitle = j.role;
        } else {
          const m = j.url.match(/lever\.co\/([^\/]+)\/([a-f0-9-]{36})/i);
          if(!m) return;
          const res = await fetch(`https://api.lever.co/v0/postings/${m[1]}/${m[2]}`,
            {signal:AbortSignal.timeout(7000)});
          if(!res.ok) return;
          const d = await res.json();
          liveTitle = d.text||j.role;
          desc = [d.descriptionPlain||'',(d.lists||[]).map(l=>l.content||'').join(' '),d.additionalPlain||''].join(' ');
        }
      }
      else if(j.src==='Ashby'){
        // Ashby returns descriptionPlain/Html in the listing — captured at scan time
        if(j._scanDesc && j._scanDesc.length > 100){
          desc = j._scanDesc;
        } else {
          // Fallback: re-fetch the board and find this job by id/title
          const slugMatch = (j.url||'').match(/jobs\.ashbyhq\.com\/([^\/]+)/);
          const slug = slugMatch ? slugMatch[1] : j.company.replace(/\s+/g,'');
          try{
            const res = await fetch(
              `https://api.ashbyhq.com/posting-api/job-board/${slug}?includeCompensation=true`,
              {signal:AbortSignal.timeout(7000)});
            if(res.ok){
              const d = await res.json();
              const found = (d.jobs||[]).find(jj => jj.title===j.role || j.url?.includes(jj.id));
              if(found){
                desc = (found.descriptionPlain||'').trim() ||
                       (found.descriptionHtml||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
              }
            }
          }catch(e){}
        }
      }

      j.role = liveTitle;
      j.description = desc;
      j.linkStatus = true;

      // Re-check title with real JD title
      if(!isTitleDE(liveTitle)) return;
      // Check experience level in JD
      if(!isEntry(desc)) return;

      const score = scoreJob(liveTitle, desc);
      if(score < 5) return; // pre-filter: at least 5/10 from JD scoring

      j.score = score;
      j._match = profileMatch(liveTitle, desc);
      // Use profile match score if available, otherwise use JD score
      const finalScore = j._match?.score > 0 ? j._match.score : score;
      j.score = finalScore;
      if(finalScore < 7) return; // final gate: 7/10
      matched.push(j);
    }catch(e){
      j.linkStatus = false;
    }
  }

  // Process in batches of 8
  for(let i=0; i<allCandidates.length; i+=8){
    const batch = allCandidates.slice(i,i+8);
    await Promise.allSettled(batch.map(fetchJDAndScore));
    S.searchProgress = 58 + Math.floor((i/Math.max(allCandidates.length,1))*38);
    S.searchStatus = `Scored ${Math.min(i+8,allCandidates.length)}/${allCandidates.length} JDs — ${matched.length} matches (≥7/10) so far…`;
    render();
  }

  // Sort by profile match score desc, then by date
  matched.sort((a,b)=>(b._match?.matchPct||0)-(a._match?.matchPct||0)||(b.postedAt||0)-(a.postedAt||0));

  S.jobs = matched;
  S.searching = false;
  S.searchProgress = 100;
  S.searchStatus = `Done — ${matched.length} data engineering jobs matched your profile (≥7/10)`;
  render();
}

function profileMatch(jobTitle, jobDesc){
  const text = ((jobTitle||'') + ' ' + (jobDesc||'')).toLowerCase();
  const matched = [];
  const missing = [];

  MY_SKILLS.forEach(s=>{
    if(text.includes(s.k)) matched.push(s);
  });

  // Flag important skills that are NOT in the JD (gaps from our side don't matter — flag what JD wants that we have/don't have)
  // Instead: show what the JD requires that matches you, and what JD requires you might lack
  const JD_WANTS = ['dbt','airflow','kafka','kubernetes','docker','scala','java','bigquery','redshift','terraform','looker','tableau','power bi','databricks certification','spark certification','snowflake'];
  JD_WANTS.forEach(skill=>{
    if(text.includes(skill) && !MY_SKILLS.find(s=>s.k===skill||s.display.toLowerCase()===skill)){
      missing.push(skill);
    }
  });

  // Score: % of YOUR core skills the JD is asking for
  // This answers: "how much of what YOU have does THIS job want?"
  const CORE_SKILLS = ['azure databricks','pyspark','delta lake','azure data factory','python','sql','etl','data pipeline','data warehouse','spark','streaming','azure synapse','adls','git','ci/cd','t-sql','spark sql'];
  const coreInJD    = CORE_SKILLS.filter(s=>text.includes(s));
  const coreMatched = matched.filter(s=>CORE_SKILLS.some(c=>s.k.includes(c)||c.includes(s.k)));

  // matchPct = (your matched skills / total YOUR skills that JD mentions) but weight by JD relevance
  // If JD mentions >=5 of your skills → high relevance
  // matchPct = matched.length / total_your_skills * scaling
  const totalYours = MY_SKILLS.length;
  const rawPct = Math.round((matched.length / totalYours) * 100);
  
  // Boost/penalise based on data-specific term presence
  const dataTerms = ['data engineer','data engineering','data pipeline','etl','pyspark','databricks','delta lake','spark','data warehouse','analytics engineer'];
  const dataScore = dataTerms.filter(t2=>text.includes(t2)).length;
  
  let matchPct;
  if(dataScore >= 4)      matchPct = Math.min(95, Math.max(75, rawPct + 20 + dataScore*2));
  else if(dataScore >= 2) matchPct = Math.min(75, Math.max(55, rawPct + 10));
  else if(dataScore >= 1) matchPct = Math.min(60, Math.max(40, rawPct));
  else                    matchPct = Math.min(45, Math.max(25, rawPct - 10)); // generic SWE role

  // Score /10
  let score = 5;
  if(dataScore >= 4 && coreMatched.length >= 4) score = 9;
  else if(dataScore >= 4 && coreMatched.length >= 2) score = 8;
  else if(dataScore >= 2 && coreMatched.length >= 2) score = 7;
  else if(matched.length >= 4) score = 7;
  else if(matched.length >= 2) score = 6;

  return { matched, missing, matchPct, score, coreMatches: coreMatched };
}

/* ── TAILORED RESUME OUTPUT ── */
function renderTailoredResume(t, jobId){
  if(!t) return "";

  // Build skills block — handle both string and object
  let skillsHtml = "";
  if(typeof t.skills === "string"){
    skillsHtml = t.skills.split("\n").map(l=>l.trim()?`<div class="rskill-row">${l.includes(":")?`<b>${l.split(":")[0]}:</b>${l.split(":").slice(1).join(":")}`:l}</div>`:"").join("");
  } else {
    skillsHtml = RESUME_SKILLS.split("\n").map(l=>l.trim()?`<div class="rskill-row">${l.includes(":")?`<b>${l.split(":")[0]}:</b>${l.split(":").slice(1).join(":")}`:l}</div>`:"").join("");
  }

  // Build jobs block — handle both {jobs:[]} and {bullets_limechat, bullets_gokwik}
  let jobsHtml = "";
  if(t.jobs && t.jobs.length){
    jobsHtml = t.jobs.map(e=>`
    <div class="rjob-head"><span>${esc(e.role||"Data Engineer")}, ${esc(e.company)}</span><span>${esc(e.period||"")}</span></div>
    ${e.stack?`<div class="rjob-stack">Tech Stack: ${esc(e.stack)}</div>`:""}
    <ul>${(e.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join("")}</ul>`).join("");
  } else {
    // Fallback: use bullets_limechat / bullets_gokwik if present
    const blc = t.bullets_limechat || [];
    const bgk = t.bullets_gokwik   || [];
    jobsHtml = `
    <div class="rjob-head"><span>Data Engineer, LimeChat</span><span>Jul 2023 – Jul 2024</span></div>
    <div class="rjob-stack">Tech Stack: Azure Databricks, PySpark, Delta Lake, Spark Structured Streaming, ADLS Gen2, Azure Data Factory, Azure DevOps</div>
    <ul>${(blc.length?blc:ME.experience[0]?.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
    <div class="rjob-head"><span>Data Engineer, GoKwik</span><span>May 2021 – Jun 2023</span></div>
    <div class="rjob-stack">Tech Stack: Azure Databricks, PySpark, Azure Synapse Analytics, Azure Data Factory, Delta Lake, PostgreSQL, MySQL, Python</div>
    <ul>${(bgk.length?bgk:ME.experience[1]?.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join("")}</ul>`;
  }

  const resumeId = `resume-${jobId||"main"}`;

  return `<div class="resume-wrap" id="${resumeId}">
  <div class="resume-toolbar">
    <span>Tailored resume · ATS format · <b style="color:var(--acc)">${esc(t.verdict||"")}</b></span>
    <div style="display:flex;gap:6px">
      <button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="downloadResumePDF('${resumeId}')">⬇ PDF</button>
      <button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="downloadResumeWord('${resumeId}')">⬇ Word</button>
      <button class="btn-ghost" style="font-size:11px;padding:4px 10px" onclick="copyResumeText('${resumeId}')">Copy</button>
    </div>
  </div>
  <div class="resume-body" id="${resumeId}-body">
    <div class="rname">RAJASEKHAR POLEPALLI</div>
    <div class="rcontact">
      Wauwatosa, WI &nbsp;·&nbsp; Open to Remote / Hybrid / Relocate
    </div>
    <div class="rcontact">
      <a href="tel:+14144364320">+1 (414) 436-4320</a> &nbsp;|&nbsp;
      <a href="mailto:rajasekhar.polepalli5@gmail.com">rajasekhar.polepalli5@gmail.com</a> &nbsp;|&nbsp;
      <a href="https://rajasekhar-polepalli.vercel.app" target="_blank">Portfolio</a> &nbsp;|&nbsp;
      <a href="https://linkedin.com/in/rajasekharpolepalli-0806793a3" target="_blank">LinkedIn</a>
    </div>
    <hr>
    <div class="rsec">SUMMARY</div>
    <hr>
    <p class="rsummary">${esc(t.summary||ME.summary)}</p>
    <div class="rsec">TECHNICAL SKILLS</div>
    <hr>
    ${skillsHtml}
    <div class="rsec">PROFESSIONAL EXPERIENCE</div>
    <hr>
    ${jobsHtml}
    <div class="rsec">EDUCATION</div>
    <hr>
    ${ME.education.map(e=>`<div class="redu-row"><span><b>${esc(e.degree)}</b>, ${esc(e.school)}</span><span>${esc(e.period)}</span></div>`).join("")}
  </div>
</div>`;
}

/* ── AI TAILOR ── */
async function tailorJob(id, btn){
  const j = S.jobs.find(x=>x.id===id) || S.apps.find(x=>x.id===id);
  if(!j) return;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Tailoring…';

  const isIntern = j.role.toLowerCase().includes("intern")||j.role.toLowerCase().includes("co-op")||j.role.toLowerCase().includes("co op");

  const prompt=`You are an ATS resume expert. Return ONLY a JSON object — no text before or after, no markdown fences.

JOB: ${j.role} at ${j.company}
TYPE: ${isIntern?"Internship/Co-op — frame as eager MS CS student with production fundamentals":"Entry-level 0-2yr role"}
CANDIDATE: Rajasekhar Polepalli, MS Computer Science (Concordia University Wisconsin, Dec 2026), Data Engineer
REAL METRICS TO KEEP: LimeChat: 5M+ events/day, 40% latency reduction, 99.9% SLA, 60% fewer deployment failures. GoKwik: 3M+ transactions/month, batch runtime 90→35 min, query performance +45%, daily→hourly data freshness.

Respond with exactly this JSON structure:
{
  "score": 9,
  "verdict": "one sentence on why this is a strong match",
  "summary": "2-sentence professional summary tailored to this specific role and company, using keywords from the job title. ${isIntern?"Frame as MS CS student seeking hands-on experience. Do NOT mention 3+ years or seniority.":"Focus on production data engineering fundamentals."}",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake\\nProgramming: Python, PySpark, SQL, Spark SQL, T-SQL, YAML\\nData Engineering: ETL/ELT, Lakehouse Architecture, Bronze/Silver/Gold, Dimensional Modeling, Star Schema\\nStreaming: Spark Structured Streaming, Event-Time Processing, Delta Lake Checkpointing\\nDevOps: Azure DevOps, Git, CI/CD, pytest, YAML Pipelines\\nDatabases: PostgreSQL, MySQL, REST APIs, Pandas, NumPy",
  "jobs": [
    {
      "role": "Data Engineer",
      "company": "LimeChat",
      "period": "Jul 2023 – Jul 2024",
      "stack": "pick 5-7 tools most relevant to ${j.role}: Azure Databricks, PySpark, Delta Lake, Spark Structured Streaming, ADLS Gen2, Azure Data Factory, Azure DevOps, pytest",
      "bullets": [
        "strong-verb bullet using this JD keywords, metric: 5M+ events/day, 40% latency reduction",
        "strong-verb bullet, metric: 99.9% SLA",
        "strong-verb bullet, metric: 60% fewer deployment failures",
        "strong-verb bullet relevant to ${j.company} tech stack"
      ]
    },
    {
      "role": "Data Engineer",
      "company": "GoKwik",
      "period": "May 2021 – Jun 2023",
      "stack": "pick 5-7 tools most relevant to ${j.role}: Azure Databricks, PySpark, Azure Synapse Analytics, Delta Lake, PostgreSQL, MySQL, Azure Data Factory, Python",
      "bullets": [
        "strong-verb bullet using JD keywords, metric: 3M+ transactions/month",
        "strong-verb bullet, metric: batch runtime 90→35 min",
        "strong-verb bullet, metric: query performance +45%",
        "strong-verb bullet, metric: daily→hourly data freshness"
      ]
    }
  ],
  "keywords": ["6 exact ATS keywords extracted from the job description"]
}`;

  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    // Extract JSON robustly — strip any prose before/after
    const jsonMatch = txt.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error("No JSON in response");
    const r = JSON.parse(jsonMatch[0]);
    j.tailored = r; j.verdict = r.verdict; if(r.score) j.score = r.score;
    if(!S.apps.find(x=>x.id===j.id)) S.apps.push(j);
    render();
  } catch(e){
    btn.disabled=false; btn.textContent="Try again";
    console.error("Tailor error:", e.message);
  }
}

function markApplied(id){
  const j = S.jobs.find(x=>x.id===id)||S.apps.find(x=>x.id===id);
  if(j){ j.applied=true; if(!S.apps.find(x=>x.id===id)) S.apps.push(j); render(); }
}

async function runAdd(){
  const title = document.getElementById("add-title")?.value?.trim();
  const co = document.getElementById("add-co")?.value?.trim();
  const jd = document.getElementById("add-jd")?.value?.trim();
  const btn = document.getElementById("add-btn");
  const err = document.getElementById("add-err");
  if(!jd||jd.length<40){ if(err) err.textContent="Please paste a fuller job description."; return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Scoring & tailoring…';
  if(err) err.textContent="";
  const newJob = {id:"p"+Date.now(), role:title||"Data Engineer Role", company:co||"Company", loc:"", pay:"", src:"Pasted", board:"", score:8, url:"", applied:false, tailored:null};
  S.jobs.push(newJob);
  // Reuse tailorJob but pass JD into prompt via a modified approach
  const prompt=`You are an expert ATS resume writer for Data Engineering roles.

TARGET ROLE: ${newJob.role} at ${newJob.company}
JOB DESCRIPTION:
${jd}

CANDIDATE: Rajasekhar Polepalli — 3+ years Data Engineer, Azure/Databricks/PySpark specialist
STRATEGY: This is a ${newJob.role.toLowerCase().includes("intern")?"internship":"entry-level/1-year-exp"} role. Tailor to appear as a strong match.

Return ONLY valid JSON (no markdown):
{
  "score": <int 1-10, honest match>,
  "verdict": "<one sentence>",
  "summary": "<2-sentence tailored summary using the JD language>",
  "skills": "Cloud Platforms: Microsoft Azure, Azure Databricks, Azure Synapse Analytics, Azure Data Factory, ADLS Gen2, Microsoft Fabric, Delta Lake, Azure SQL\\nProgramming & Query: SQL, T-SQL, Spark SQL, Python, PySpark, YAML, DAX, Shell\\nData Engineering: ETL/ELT, Data Warehousing, Dimensional Modeling, Star Schema, Lakehouse, Bronze/Silver/Gold Architecture\\nStreaming & Real-Time: Spark Structured Streaming, Event-Time Processing, Watermarking, Delta Lake Checkpointing\\nDevOps & CI/CD: Azure DevOps, Git, GitHub, YAML Pipelines, CI/CD, pytest, Agile/Scrum\\nDatabases & Integration: PostgreSQL, MySQL, REST APIs, JSON, Pandas, NumPy, T-SQL Stored Procedures\\nGovernance & Quality: Data Governance, Data Lineage, Data Quality, Schema Validation",
  "jobs": [
    {"role":"Data Engineer","company":"LimeChat","location":"India","period":"Jul 2023 – Jul 2024","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 5M+ events/day, 40% latency cut, 99.9% SLA>"]},
    {"role":"Data Engineer","company":"GoKwik","location":"India","period":"May 2021 – Jun 2023","stack":"<6-8 relevant tools>","bullets":["<4 rewritten bullets using JD keywords, keep metrics: 3M+ txn/month, 90→35 min, 45% query perf>"]}
  ],
  "keywords": ["<6 ATS keywords>"],
  "plain": "<full plain text resume>"
}`;
  try{
    const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:prompt}]})});
    const d = await res.json();
    let txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const r = JSON.parse(txt);
    newJob.tailored=r; newJob.verdict=r.verdict; if(r.score) newJob.score=r.score;
    S.apps.push(newJob); S.tab="apps"; render();
  } catch(e){
    btn.disabled=false; btn.innerHTML="✦ Score &amp; tailor resume";
    if(err) err.textContent="Couldn't parse that — try again with a fuller description.";
  }
}
